name: Auto Check

on: [push]

jobs:
  docker-build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check core files exist
        run: |
          if [ ! -f "docker-compose.yml" ]; then
            echo "Critical Error: docker-compose.yml not found in root directory!"
            echo "Hint: All projects must include backend Docker configuration."
            exit 1
          fi
          if [ ! -f ".version" ]; then
            echo "Critical Error: .version file not found in root directory!"
            exit 1
          fi

      - name: Read version number
        id: version
        run: |
          VERSION=$(cat .version | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Validate docker compose config
        run: docker compose config
        
      - name: Test Docker build
        run: docker compose build

      - name: Verify image tags
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Checking image tags..."
          docker images | grep "yanbian-backend" | grep "$VERSION"
          docker images | grep "yanbian-frontend" | grep "$VERSION"
          echo "Image tag verification passed!"