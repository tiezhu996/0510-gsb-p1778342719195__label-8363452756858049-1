version: '3.8'

services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: yanbian-db
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: yanbian_db
      MYSQL_USER: yanbian
      MYSQL_PASSWORD: yanbian123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/db:/docker-entrypoint-initdb.d
    networks:
      - yanbian-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION}
    image: ${IMAGE_REGISTRY}${BACKEND_IMAGE}:${APP_VERSION}
    container_name: yanbian-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/yanbian_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: yanbian
      SPRING_DATASOURCE_PASSWORD: yanbian123
      APP_VERSION: ${APP_VERSION}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - yanbian-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/carousel/list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Vue 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION}
    image: ${IMAGE_REGISTRY}${FRONTEND_IMAGE}:${APP_VERSION}
    container_name: yanbian-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - yanbian-network

volumes:
  mysql-data:
  backend-uploads:

networks:
  yanbian-network:
    driver: bridge
